name: Deploy Velopack Release to GitHub

on:
  push:
    branches: [ stock ]
  workflow_dispatch:

jobs:
  deploy-to-github-releases:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet Packages
        uses: nuget/setup-nuget@v2
        with:
          # Especificamos que busque el archivo .sln o .vbproj en la ruta
          # NuGet busca automáticamente los archivos .config para saber qué restaurar.
          nuget-api-key: ${{ secrets.NUGET_API_KEY }} # Opcional si usas feeds privados
          
      # Ejecutar la restauración de paquetes
      - name: Run NuGet Restore
        shell: pwsh
        run: nuget restore "SistemaFacturación/SistemaFacturación.vbproj" -PackagesDirectory "packages"

      - name: Get Version from Project File
        id: get-version
        shell: pwsh
        run: |
          $content = Get-Content -Path "SistemaFacturación\SistemaFacturación.vbproj" -Raw
          if ($content -match '<ApplicationVersion>([^<]+)</ApplicationVersion>') {
            echo "version=$($matches[1])" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "ApplicationVersion not found in .vbproj"
            exit 1
          }

      # (PASO NUEVO) 4. Crear un app.config temporal para satisfacer a MSBuild
      - name: Create Dummy App.config
        shell: pwsh
        run: |
          # La ruta es relativa a la raíz del repositorio
          $configPath = "SistemaFacturación/app.config" 
          
          # Contenido mínimo y no sensible, solo para que el XML sea válido.
          $content = @"
            <?xml version="1.0" encoding="utf-8" ?>
            <configuration>
            </configuration>
            "@
          # Escribe el archivo en la ruta que MSBuild espera
          $content | Out-File -FilePath $configPath -Encoding UTF8
          Write-Host "Dummy app.config creado en $configPath para el build."
          
      - name: Build Project with MSBuild
        shell: pwsh
        run: |
          msbuild "SistemaFacturación\SistemaFacturación.vbproj" /p:Configuration=Release /p:OutDir="publish\"

      - name: Verify Executable Exists
        shell: pwsh
        run: |
          if (-not (Test-Path "publish\Sistema de Facturación Common.exe")) {
            Write-Error "Executable not found! Check project output name."
            exit 1
          }

      - name: Install Velopack CLI (vpk)
        shell: pwsh
        run: |
          dotnet tool install -g vpk

      - name: Create and Upload Release with Velopack
        shell: pwsh
        run: |
          vpk pack `
            -u "SistemaFacturacionCommon" `
            -v "${{ steps.get-version.outputs.version }}" `
            -p "publish" `
            -e "Sistema de Facturación Common.exe" `
            -f "net472" `
            --packTitle "Sistema Facturación Common" `
            -i "SistemaFacturación\Resources\logoSFCommonSimple_1_.ico" `
            -s "SistemaFacturación\Resources\logoCompletoSFCommonTransparent.png" `
            --releaseNotes "RELEASENOTES.md" `
            --shortcuts "Desktop,StartMenuRoot"

          vpk upload github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --publish `
            --releaseName "Sistema Facturación v${{ steps.get-version.outputs.version }}" `
            --tag "v${{ steps.get-version.outputs.version }}" `
            --token "${{ secrets.GITHUB_TOKEN }}"
