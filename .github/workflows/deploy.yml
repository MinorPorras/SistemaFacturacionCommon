name: Deploy Velopack Release to GitHub

on:
  push:
    branches: [ stock ]
  workflow_dispatch:

jobs:
  deploy-to-github-releases:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # --- PASO CRÍTICO: RESTAURAR PAQUETES ---
      - name: Restore NuGet Packages Setup
        uses: nuget/setup-nuget@v2

      - name: Run NuGet Restore
        shell: pwsh
        run: nuget restore "SistemaFacturación/SistemaFacturación.vbproj" -PackagesDirectory "packages"

      # --- PASO: OBTENER VERSIÓN Y RECORTAR (SEMVER2) ---
      - name: Get Version from Project File
        id: get-version
        shell: pwsh
        run: |
          $content = Get-Content -Path "SistemaFacturación\SistemaFacturación.vbproj" -Raw
          if ($content -match '<ApplicationVersion>([^<]+)</ApplicationVersion>') {
            # Obtiene la versión completa (ej: 2.1.2.0)
            $fullVersion = $matches[1]
            # Recorta la versión a SemVer2 (3 partes)
            $semVer = ($fullVersion -split '\.')[0..2] -join '.'
            Write-Host "Versión SemVer2 extraída: $semVer"
            echo "version=$semVer" >> $env:GITHUB_OUTPUT
          } else {
            Write-Error "ApplicationVersion not found in .vbproj"
            exit 1
          }

      # --- PASO: CREAR DUMMY CONFIG ---
      - name: Create Dummy App.config
        shell: pwsh
        run: |
          $configPath = "SistemaFacturación/app.config"
          
          # La clave se obtiene de forma segura de GitHub Secrets
          $syncfusionKey = "${{ secrets.SYNCFUSION_LICENSE }}"
          
          $xmlContent = '<?xml version="1.0" encoding="utf-8" ?>' + "`n" + `
            '<configuration>' + "`n" + `
            '  <appSettings>' + "`n" + `
            "    <add key=`"Syncfusion.Licensing`" value=`"$syncfusionKey`" />" + "`n" + `
            '    <add key="ClientSettingsProvider.ServiceUri" value="" />' + "`n" + `
            '  </appSettings>' + "`n" + `
            '</configuration>'
          
          $xmlContent | Out-File -FilePath $configPath -Encoding UTF8
          Write-Host "Dummy app.config creado y licencia Syncfusion inyectada."

      # --- PASO: COMPILAR PROYECTO ---
      - name: Build Project with MSBuild
        shell: pwsh
        run: |
          msbuild "SistemaFacturación\SistemaFacturación.vbproj" /p:Configuration=Release /p:OutDir="publish\"

      # --- PASO: VERIFICAR EJECUTABLE ---
      - name: Verify Executable Exists
        shell: pwsh
        run: |
          # La ruta correcta es DENTRO de la carpeta del proyecto
          if (-not (Test-Path "SistemaFacturación\publish\Sistema de Facturación Common.exe")) {
            Write-Error "Executable not found! Check project output name and build path."
            exit 1
          }

      # --- PASO: VELOPACK PACK Y UPLOAD ---
      - name: Install Velopack CLI (vpk)
        shell: pwsh
        run: |
          dotnet tool install -g vpk

      - name: Create and Upload Release with Velopack
        shell: pwsh
        run: |
          # 1. Empaquetar y crear DELTAS
          vpk pack `
            -u "CommonSistemaFacturacion" `
            -v "${{ steps.get-version.outputs.version }}" `
            -p "SistemaFacturación\publish" `
            -e "Sistema de Facturación Common.exe" `
            -f "net472" `
            --packTitle "Sistema Facturación Common" `
            -i "SistemaFacturación\Resources\logoSFCommonSimple_1_.ico" `
            -s "SistemaFacturación\Resources\logoCompletoSFCommonTransparent.png" `
            --releaseNotes "RELEASENOTES.md" `
            --shortcuts "Desktop,StartMenuRoot" `
            --delta-source "github" ` 
            --token "${{ secrets.GITHUB_TOKEN }}"

          # 2. Subir a GitHub
          # Este paso SÍ necesita el token, pero ahora está garantizado que los deltas
          # ya fueron creados en el disco por el paso 'pack'.
          vpk upload github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --publish `
            --releaseName "Sistema Facturación v${{ steps.get-version.outputs.version }}" `
            --tag "v${{ steps.get-version.outputs.version }}" `
            --token "${{ secrets.GITHUB_TOKEN }}"
